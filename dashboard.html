<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <h1>STOCKFLOW</h1>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <a href="#">Productos</a>
            <a href="#">Inventario</a>
            <a href="#">Ventas</a>
            <a href="#">Reportes</a>
            <a href="#">Alertas</a>
            <a href="#">Categorías</a>
            <a href="#">Marcas</a>
            <a href="#">Proveedores</a>
            <a href="#">Entradas A.</a>
            <a href="#">Merma</a>
            <a href="#">Kardex</a>
            <a href="#">Caja</a>

            <a href="index.html" class="cerrar-sesion">Cerrar sesión</a>
        </aside>

        <main class="contenido">
            <h2>Resumen General</h2>

            <section class="cards">
                <div class="card">
                    <h3>Total de productos</h3>
                    <p id="totalProductos">0</p>
                </div>

                <div class="card">
                    <h3>Ventas del día</h3>
                    <p id="ventasDia">$0.00</p>
                </div>

                <div class="card">
                    <h3>Productos bajo stock</h3>
                    <p id="productosBajoStock">0</p>
                </div>
            </section>

            <section class="panel">
                <h3>Ventas</h3>
                <div class="grafica-placeholder">
                    Gráfica general de ventas
                </div>
            </section>
        </main>
    </div>

    <script src="js/dashboard.js"></script>

</body>
</html>
