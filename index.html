<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <header class="login-header">
        <h1>STOCKFLOW</h1>
    </header>

    <main class="login-main">
        <section class="login-box">
            <form id="loginForm">
                <label for="usuario">USUARIO:</label>
                <input type="text" id="usuario" required>

                <label for="password">CONTRASEÑA:</label>
                <input type="password" id="password" required>

                <button type="submit">INICIAR SESIÓN</button>

                <a href="#" class="link-login" id="abrirRegistro">Crear Cuenta</a>
                <a href="#" class="link-login" id="abrirRecuperacion">¿Olvidaste tu contraseña?</a>

                <p id="mensajeLogin"></p>
            </form>
        </section>
    </main>

    <footer class="login-footer"></footer>

<div id="modalRegistro" class="modal">
    <div class="modal-contenido">
        <h2>Registro de Usuario</h2>

        <form id="registroForm">
            <label>Nombre:</label>
            <input type="text" id="nombre">

            <label>Apellido Paterno:</label>
            <input type="text" id="apellidoPaterno">

            <label>Apellido Materno:</label>
            <input type="text" id="apellidoMaterno">

            <label>Usuario:</label>
            <input type="text" id="usuarioRegistro" required>

            <label>Correo:</label>
            <input type="email" id="correoRegistro" required>

            <label>Contraseña:</label>
            <input type="password" id="passwordRegistro" required>

            <label>Confirmar Contraseña:</label>
            <input type="password" id="confirmarPassword" required>

            <div class="modal-botones">
                <button type="submit">Crear Cuenta</button>
                <button type="button" id="cancelarRegistro">Cancelar</button>
            </div>

            <p id="mensajeRegistro"></p>
        </form>
    </div>
</div>

<div id="modalRecuperacion" class="modal">
    <div class="modal-contenido">
        <h2>Recuperar Contraseña</h2>

        <form id="recuperacionForm">
            <label>Correo electrónico:</label>
            <input type="email" id="correoRecuperacion" required>

            <div class="modal-botones">
                <button type="submit">Verificar</button>
                <button type="button" id="cancelarRecuperacion">Cancelar</button>
            </div>

            <p id="mensajeRecuperacion"></p>
        </form>
    </div>
</div>

<div id="modalRecuperacion" class="modal">
    <div class="modal-contenido">
        <h2>Recuperar Contraseña</h2>

        <form id="recuperacionForm">
            <label>Correo electrónico:</label>
            <input type="email" id="correoRecuperacion" required>

            <div class="modal-botones">
                <button type="submit">Verificar</button>
                <button type="button" id="cancelarRecuperacion">Cancelar</button>
            </div>

            <p id="mensajeRecuperacion"></p>
        </form>
    </div>
</div>

<div id="modalNuevaPassword" class="modal">
    <div class="modal-contenido">
        <h2>Nueva Contraseña</h2>

        <form id="nuevaPasswordForm">
            <label>Nueva contraseña:</label>
            <input type="password" id="nuevaPassword" required>

            <label>Confirmar contraseña:</label>
            <input type="password" id="confirmarNuevaPassword" required>

            <div class="modal-botones">
                <button type="submit">Guardar</button>
                <button type="button" id="cancelarNuevaPassword">Cancelar</button>
            </div>

            <p id="mensajeNuevaPassword"></p>
        </form>
    </div>
</div>

    <script src="js/login.js"></script>
</body>
</html>
