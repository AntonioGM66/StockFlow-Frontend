<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StockFlow - Proveedores</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <h1>STOCKFLOW</h1>
</header>

<div class="layout">
    <aside class="sidebar">
        <a href="productos.html">Productos</a>
        <a href="#">Inventario</a>
        <a href="#">Ventas</a>
        <a href="#">Reportes</a>
        <a href="#">Alertas</a>
        <a href="categorias.html">Categorias</a>
        <a href="marcas.html">Marcas</a>
        <a href="proveedores.html">Proveedores</a>
        <a href="#">Entradas A.</a>
        <a href="#">Merma</a>
        <a href="#">Kardex</a>
        <a href="#">Caja</a>
        <a href="index.html" class="cerrar-sesion">Cerrar sesión</a>
    </aside>

    <main class="contenido">

        <section class="producto-panel">
            <h2>Gestión de Proveedores</h2>

            <form id="proveedorForm">
                <div class="campo">
                    <label>Nombre / Razón Social</label>
                    <input type="text" id="razonSocial" maxlength="150" required>
                </div>

                <div class="campo">
                    <label>RFC / Identificación</label>
                    <input type="text" id="rfc" maxlength="30" required>
                </div>

                <div class="campo">
                    <label>Teléfono</label>
                    <input type="text" id="telefono" maxlength="30">
                </div>

                <div class="campo">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo" maxlength="120">
                </div>

                <div class="acciones-producto">
                    <button type="submit" id="btnGuardarProveedor">Guardar</button>
                    <button type="button" id="btnCancelarProveedor">Cancelar</button>
                </div>

                <p id="mensajeProveedor"></p>
            </form>
        </section>

        <section class="tabla-panel">
            <h2>Proveedores Registrados</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Razón Social</th>
                        <th>RFC</th>
                        <th>Teléfono</th>
                        <th>Correo</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaProveedores"></tbody>
            </table>
        </section>

    </main>
</div>

<script src="js/sesion.js"></script>
<script src="js/proveedores.js"></script>

</body>
</html>
