<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow - Productos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <h1>STOCKFLOW</h1>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <a href="productos.html">Productos</a>
            <a href="#">Inventario</a>
            <a href="#">Ventas</a>
            <a href="#">Reportes</a>
            <a href="#">Alertas</a>
            <a href="#">Categorias</a>
            <a href="#">Marcas</a>
            <a href="#">Provedores</a>
            <a href="#">Entradas A.</a>
            <a href="#">Merma</a>
            <a href="#">Kardex</a>
            <a href="#">Caja</a>
            <a href="index.html" class="cerrar-sesion">Cerrar sesion</a>
        </aside>

<main class="contenido productos-contenido">
    <section class="producto-panel">
        <h2>Registro de Productos</h2>

        <form id="productoForm" class="producto-form">

            <div class="campo">
                <label>Nombre</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="campo">
                <label>Descripcion</label>
                <textarea id="descripcion"></textarea>
            </div>

            <div class="campo">
                <label>Categoria</label>
                <select id="categoria" required></select>
            </div>

            <div class="campo">
                <label>Precio</label>
                <input type="number" id="precioVenta" step="0.01" required>
            </div>

            <div class="campo">
                <label>Stock Principal</label>
                <input type="number" id="stockActual" required>
            </div>

            <div class="campo">
                <label>Stock Mínimo</label>
                <input type="number" id="stockMinimo" required>
            </div>

            <div class="campo campo-codigo">
                <label>Codigo de Barras</label>
                <input type="text" id="codigoBarras" required>
            </div>

            <div class="campo">
                <label>Marca</label>
                <select id="marca" required></select>
            </div>

            <div class="acciones-producto">
                <button type="submit">Guardar</button>
                <button type="reset">Cancelar</button>
            </div>

            <p id="mensajeProducto"></p>
        </form>
    </section>

<div class="buscador-productos">
    <label>Buscar:</label>

    <input
        type="text"
        id="buscarProducto"
        placeholder="Nombre o código de barras"
    >

    <button type="button" id="btnBuscarProducto">
        Buscar
    </button>

    <button type="button" id="btnLimpiarBusqueda">
        Limpiar
    </button>
</div>

<section class="tabla-panel">
    <h2>Productos Registrados</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Código</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Marca</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaProductos"></tbody>
    </table>
</section>
</main>
    </div>

    <script src="js/productos.js"></script>
</body>
</html>
