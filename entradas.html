<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow - Entradas de Almacén</title><link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header"><h1>STOCKFLOW</h1></header>
<div class="layout">
    <aside class="sidebar">
        <a href="productos.html">Productos</a><a href="inventario.html">Inventario</a>
        <a href="ventas.html">Ventas</a><a href="#">Reportes</a><a href="alertas.html">Alertas</a>
        <a href="categorias.html">Categorías</a><a href="marcas.html">Marcas</a>
        <a href="proveedores.html">Proveedores</a><a href="entradas.html">Entradas A.</a>
        <a href="merma.html">Merma</a><a href="kardex.html">Kardex</a><a href="#">Caja</a>
        <a href="index.html" class="cerrar-sesion">Cerrar sesión</a>
    </aside>
    <main class="contenido">
        <section class="producto-panel">
            <h2>Entradas de Almacén</h2>
            <form id="entradaForm" class="formulario-prototipo">
                <div class="buscador-productos">
                    <input id="buscarEntrada" type="text" placeholder="Buscar Producto">
                    <button type="button" id="btnBuscarEntrada">Buscar</button>
                </div>
                <div class="campo"><label>Producto</label><select id="productoEntrada" required></select></div>
                <div class="campo"><label>Proveedor</label><select id="proveedorEntrada" required></select></div>
                <div class="campo"><label>Cantidad Recibida</label><input id="cantidadEntrada" type="number" min="1" required></div>
                <div class="campo"><label>Costo Unitario</label><input id="costoEntrada" type="number" min="0" step="0.01" required></div>
                <div class="acciones-producto">
                    <button type="submit">Registrar Entrada</button><button type="reset">Cancelar</button>
                </div>
                <p id="mensajeEntrada"></p>
            </form>
        </section>
        <section class="tabla-panel">
            <h2>Historial de Entradas</h2>
            <table>
                <thead><tr><th>Fecha</th><th>Producto</th><th>Proveedor</th><th>Cantidad</th><th>Costo Total</th></tr></thead>
                <tbody id="tablaEntradas"></tbody>
            </table>
        </section>
    </main>
</div>
<script src="js/sesion.js"></script><script src="js/entradas.js"></script>
</body>
</html>
